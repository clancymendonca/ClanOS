# Required fields for docs/scope-NNN-checklist.md files.

[schema]
version = "1.0.0"

[required_fields]
threat_node_mapping = "List of THREAT_NODES.toml ids addressed or introduced"
proof_tier = "A | B | C | D"
harness_bound = "Kani bound or N/A with justification"
fuzz_target = "FUZZ_TARGETS id or N/A"
compat_review_entry = "bool — compat impact reviewed"
oom_stub_ref = "MEM_BUDGET / shed stub section or N/A"
benchmark_baseline_ref = "baseline JSON key or N/A"
scope_owner = "string — sole feat(scope-NNN) committer"
backup_reviewer = "string"

# Architecturally consequential decisions — DECISION_LOG entry required before scope close (#334).
# Each entry names the decision category, owning doc, and earliest closing scope.

[[required_decisions]]
id = "scheduler_priority_inversion"
summary = "Priority inheritance, ceiling, or explicit denial under cap chains"
doc = "docs/SCHEDULER_MODEL.md"
earliest_scope = 121
decision_log_required = true

[[required_decisions]]
id = "r_destroy_notify_ordering"
summary = "R-destroy-notify delivery ordering (simultaneous vs serialized)"
doc = "docs/KERNEL_OBJECT_MODEL.md"
earliest_scope = 121
decision_log_required = true

[[required_decisions]]
id = "mint_vs_delegation_authority"
summary = "Named mint role vs all-caps-from-root-mint policy"
doc = "docs/KERNEL_OBJECT_MODEL.md"
earliest_scope = 121
decision_log_required = true

[[required_decisions]]
id = "cap_reference_cycle_policy"
summary = "Cap table reference cycle detection and revocation behavior"
doc = "docs/KERNEL_OBJECT_MODEL.md"
earliest_scope = 121
decision_log_required = true

[[required_decisions]]
id = "wait_set_revocation_policy"
summary = "Partial vs all-terminal wait-set revocation on multi-cap wait"
doc = "docs/SCHEDULER_MODEL.md"
earliest_scope = 121
decision_log_required = true

[[required_decisions]]
id = "audit_tamper_policy"
summary = "Chain hash vs privileged-write tamper model for audit subsystem"
doc = "docs/AUDIT_SUBSYSTEM.md"
earliest_scope = 121
decision_log_required = true

[[required_decisions]]
id = "driver_isolation_model"
summary = "Kernel TCB vs process+device caps vs hybrid driver hosting"
doc = "docs/DRIVER_MODEL.md"
earliest_scope = 122
decision_log_required = true

[[required_decisions]]
id = "suspend_flush_timeout"
summary = "Suspend flush timeout → block suspend vs hard terminate (tier 3)"
doc = "docs/FAULT_ESCALATION.md"
earliest_scope = 121
decision_log_required = true

[scope_close_gate]
# CI checks decision_log_entry field in checklist when closing scope >= earliest_scope
decision_log_entry = "DECISION_LOG.md anchor id matching required_decisions.id"
