# Machine-readable cap kind registry — CI sync with KERNEL_OBJECT_MODEL.md

[schema]
version = "1.0.0"
namespaces = ["kernel", "device", "compat"]

# New kind checklist (#335): document in DECISION_LOG whether kind is
# disjoint | specialization | generalization of existing kinds.

[[kinds]]
id = "kernel.process"
namespace = "kernel"
object_kind = "Process"
