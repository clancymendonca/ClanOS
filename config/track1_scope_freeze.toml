# Track 1 doc migration epoch — scope freeze manifest (CI: covenant_ci via track1_scope_check.py)

[epoch]
id = "track1-doc-migration"
description = "Migrate flat docs to docs/architecture/, docs/specs/, docs/process/, docs/proofs/ (Track 1 creates all four subdirectory trees)"
scope_freeze_commit = "8f0052b9a327c4779a93efbba8bccb6754593e1f"
max_wall_clock_days = 30
triage_fallback = ["KOM", "FE", "SM"]
status = "open"

[semantic_diff_baseline]
record_at = "migration_pr_merge"
fields = ["status_header_hash", "section_count", "mermaid_diagram_count", "cross_ref_count"]
stored_in = "config/migration_baselines.json"

[warnings]
target = "kernel"
deny_warnings_commit = "8f0052b9a327c4779a93efbba8bccb6754593e1f"
pre_existing_count = 3
resolution_required_before_gate = true

[exclusions]
workspace_restructure = "deferred — no servers/ extraction during this epoch"
ares_rt_no_std = "deferred — tracked in DECISION_LOG ares-rt-001; architecture_state.toml has_no_std_enforcement=false"
new_architecture_docs = "any doc not in [[docs]] list requires charter approval to add"
subdirectory_policy = "track1_creates_specs_process_proofs — specs→docs/specs/, process→docs/process/, proofs→docs/proofs/, architecture→docs/architecture/; defers second migration"
threat_nodes_physical_move = "deferred — docs/THREAT_NODES.toml remains canonical at flat path; config/README.md mapping only"
phase_checklists = "docs/phase-*.md — working documents, not migrated"
roadmaps = "docs/ROADMAP_*.md — working documents, not migrated"
release_scorecards = "docs/RELEASE_SCORECARD_*.md — milestone artifacts, not migrated"
plan_supersession = "docs/PLAN_SUPERSESSION.md — archived; superseded-by gap_registry.toml; no migration"
security_model = "docs/architecture/SECURITY_MODEL.md — already canonical; no flat_src; reconcile references only at gate"
signoff_manifest = "epoch_signoffs/track1.toml — solo-dev multi-domain per CHARTER.md §Minimum viable team"

