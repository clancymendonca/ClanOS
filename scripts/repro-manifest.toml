# Build reproducibility manifest — epoch 2 stub (BUILD_INTEGRITY.md).

[tools]
rustc = "stable"
llvm = "bundled"
linker = "rust-lld"

[kernel]
target = "x86_64-unknown-none"
package = "kernel"

[userland]
