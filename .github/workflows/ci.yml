name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validation:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, rust-src, llvm-tools-preview

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cache bootimage tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/bootimage
            ~/.cargo/bin/bootimage-runner
            ~/.cargo/bin/cargo-bootimage
          key: bootimage-tools-${{ runner.os }}-0.9.0-v1

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 nasm

      - name: Install bootimage
        run: |
          if ! command -v bootimage >/dev/null 2>&1; then
            cargo install bootimage --version 0.9.0 --locked
          fi

      - name: Verify formatting
        run: cargo fmt --all -- --check

      - name: Full validation matrix
        run: |
          python3 scripts/validation_matrix.py \
            --soak-duration 30 \
            --latency-duration 30 \
            --boot-wait 90 \
            --smoke-timeout 180
